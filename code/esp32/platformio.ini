; =============================================================================
; EvoBot reference-01 — PlatformIO Build Configuration
; =============================================================================
; Build with:   pio run
; Upload with:  pio run --target upload
; Monitor with: pio device monitor
;
; The ESP32 connects to the workstation via USB for flashing and debug
; console. The Pi communicates over UART2 (GPIO16/17), not USB.
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor speed (matches debug Serial.begin in main.cpp)
monitor_speed = 115200

; Compiler flags
build_flags =
    -DCORE_DEBUG_LEVEL=0     ; Suppress ESP-IDF debug noise on Serial
    -DARDUINO_USB_MODE=0     ; Standard UART mode (not USB-CDC)

; Library dependencies (none required — all code is self-contained)
lib_deps =

; Upload speed — use 921600 for faster flashing on most ESP32 DevKits
upload_speed = 921600

; Partition scheme — default is fine for this firmware
board_build.partitions = default.csv
